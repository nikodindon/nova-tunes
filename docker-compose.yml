services:
  navidrome:
    image: deluan/navidrome:latest
    container_name: navidrome
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./navidrome/data:/data
      - ./music:/music:rw
    environment:
      - ND_SCANSCHEDULE=1h
      - ND_LOGLEVEL=info

  soulseek:
    image: slskd/slskd:latest
    container_name: soulseek
    restart: unless-stopped
    network_mode: host
    ports:
      - "5030:5030"
      - "50300:50300"
    volumes:
      - ./soulseek/data:/app
      - ./music:/music
    environment:
      # Soulseek account credentials (v0.25.x variable names)
      - SLSKD_SOULSEEK_USERNAME=${SLSKD_SOULSEEK_USERNAME}
      - SLSKD_SOULSEEK_PASSWORD=${SLSKD_SOULSEEK_PASSWORD}
      # Web UI authentication (disabled = no login required)
      - SLSKD_WEB_AUTHENTICATION_DISABLED=${SLSKD_WEB_AUTHENTICATION_DISABLED}
      - SLSKD_WEB_AUTHENTICATION_USERNAME=${SLSKD_WEB_AUTHENTICATION_USERNAME}
      - SLSKD_WEB_AUTHENTICATION_PASSWORD=${SLSKD_WEB_AUTHENTICATION_PASSWORD}
      # Download directory
      - SLSKD_DIRECTORIES_DOWNLOADS=/music
    user: "1000:1000"
