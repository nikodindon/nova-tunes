services:
  navidrome:
    image: deluan/navidrome:latest
    container_name: navidrome
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./navidrome/data:/data
      - ./music:/music:ro
    environment:
      - ND_SCANSCHEDULE=1h
      - ND_LOGLEVEL=info

  soulseek:
    image: slskd/slskd:latest
    container_name: soulseek
    restart: unless-stopped
    network_mode: host
    ports:
      - "5030:5030"
      - "5533:5533"
    volumes:
      - ./soulseek/data:/data
      - ./music:/music
